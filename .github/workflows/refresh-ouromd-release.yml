name: Refresh Ouro MD release metadata

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-ouromd-release
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run refresh:ouro-md

      - id: changes
        run: |
          if git diff --quiet -- apps/ouro-md/stable.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate refreshed site
        if: steps.changes.outputs.changed == 'true'
        run: npm test

      - name: Commit refreshed metadata
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/ouro-md/stable.json
          git commit -m "Refresh Ouro MD stable release metadata"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Build refreshed site
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - id: deploy-gate
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::CLOUDFLARE_API_TOKEN is not set; metadata was committed but production was not deployed."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy refreshed site to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true' && steps.deploy-gate.outputs.go == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ouro-apps-site --branch=main
