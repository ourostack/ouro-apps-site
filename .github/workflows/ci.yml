name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Validates the site contract on every push and PR.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  # UI checks: axe accessibility (incl. WCAG color-contrast) over the Storybook
  # component library. A dark-on-dark button — or any a11y regression — fails here.
  ui-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test-ui

  # Deploys to Cloudflare Pages on push to main. The `ouro-apps-site` project is
  # a direct-upload project (Pages Git integration can't attach to those), so the
  # deploy runs here via the Cloudflare API. The scoped Pages token is configured;
  # the explicit gate keeps forks and future credential-rotation gaps build-safe.
  deploy:
    needs: [contract, ui-checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - id: gate
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add it to enable hands-free deploys."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to Cloudflare Pages
        if: steps.gate.outputs.go == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ouro-apps-site --branch=main
